services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: lepm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  redis:
    image: redis:7-alpine
    container_name: lepm_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  # MinIO — S3-хранилище вложений (фото, аудио, видео карточки опоры)
  minio:
    image: minio/minio:latest
    container_name: lepm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - lepm_network

  # Backend API: образ из .env (BACKEND_IMAGE) для деплоя с GHCR; локально можно собрать через build
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mobilka-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lepm_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
      RELOAD: "false"
      TZ: ${TZ:-Europe/Moscow}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-lepm-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - lepm_network

  nginx:
    image: nginx:alpine
    container_name: lepm_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./web-frontend/dist/lepm-web-frontend:/app/angular-web:ro
      - ./frontend/build/web:/app/flutter-web:ro
    restart: unless-stopped
    networks:
      - lepm_network

volumes:
  pgdata:
  minio_data:

networks:
  lepm_network:
    driver: bridge
