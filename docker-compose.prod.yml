# Production stack (сервер: /root/mobilka или DEPLOY_PATH).
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# Перед первым запуском: cp server-deploy-files/env.example .env && заполнить секреты;
# SSL: bash nginx/generate-ssl-ubuntu.sh (или Let's Encrypt в nginx/ssl).
services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: lepm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lepm_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  redis:
    image: redis:7-alpine
    container_name: lepm_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  # MinIO — S3-хранилище вложений (фото, аудио, видео карточки опоры)
  minio:
    image: minio/minio:latest
    container_name: lepm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    ports:
      - "9001:9001"
    networks:
      - lepm_network

  # Backend API: образ из .env (BACKEND_IMAGE) для деплоя с GHCR; локально можно собрать через build
  backend:
    image: ${BACKEND_IMAGE:-lepm_backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lepm_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lepm_db}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:?Задайте SECRET_KEY в .env (python3 -c "import secrets; print(secrets.token_urlsafe(32))")}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_DOCKER_LOGS_ENABLED: ${ADMIN_DOCKER_LOGS_ENABLED:-true}
      ADMIN_BACKEND_PUBLIC_URL: ${ADMIN_BACKEND_PUBLIC_URL:-}
      ADMIN_MINIO_CONSOLE_URL: ${ADMIN_MINIO_CONSOLE_URL:-}
      RELOAD: "false"
      TZ: ${TZ:-Europe/Moscow}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-lepm-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=5)"',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GROUP_GID:-999}"
    restart: unless-stopped
    networks:
      - lepm_network

  nginx:
    image: nginx:alpine
    container_name: lepm_nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./web-frontend/dist/lepm-web-frontend:/app/angular-web:ro
      - ./frontend/build/web:/app/flutter-web:ro
    restart: unless-stopped
    networks:
      - lepm_network

volumes:
  pgdata:
  minio_data:

networks:
  lepm_network:
    driver: bridge
