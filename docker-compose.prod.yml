services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: lepm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  redis:
    image: redis:7-alpine
    container_name: lepm_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lepm_network

  # MinIO — S3-хранилище вложений (фото, аудио, видео карточки опоры)
  minio:
    image: minio/minio:latest
    container_name: lepm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    ports:
      - "9001:9001"
    networks:
      - lepm_network

  # Backend API: образ из .env (BACKEND_IMAGE) для деплоя с GHCR; локально можно собрать через build
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mobilka-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lepm_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_DOCKER_LOGS_ENABLED: ${ADMIN_DOCKER_LOGS_ENABLED:-true}
      ADMIN_BACKEND_PUBLIC_URL: ${ADMIN_BACKEND_PUBLIC_URL:-}
      ADMIN_MINIO_CONSOLE_URL: ${ADMIN_MINIO_CONSOLE_URL:-}
      RELOAD: "false"
      TZ: ${TZ:-Europe/Moscow}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-lepm-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GROUP_GID:-999}"
    restart: unless-stopped
    networks:
      - lepm_network

  # Apache NiFi — ETL/интеграции, UI: https://<сервер>/nifi
  nifi:
    image: apache/nifi:2.9.0
    container_name: lepm_nifi
    restart: unless-stopped
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_SINGLE_USER_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_SINGLE_USER_PASSWORD:?Set NIFI_SINGLE_USER_PASSWORD in .env}
      NIFI_WEB_PROXY_HOST: ${NIFI_WEB_PROXY_HOST:-85.239.48.199:443}
      NIFI_JVM_HEAP_INIT: ${NIFI_JVM_HEAP_INIT:-512m}
      NIFI_JVM_HEAP_MAX: ${NIFI_JVM_HEAP_MAX:-1g}
    expose:
      - "8443"
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_logs:/opt/nifi/nifi-current/logs
    networks:
      - lepm_network

  nginx:
    image: nginx:alpine
    container_name: lepm_nginx
    depends_on:
      - backend
      - nifi
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./web-frontend/dist/lepm-web-frontend:/app/angular-web:ro
      - ./frontend/build/web:/app/flutter-web:ro
    restart: unless-stopped
    networks:
      - lepm_network

volumes:
  pgdata:
  minio_data:
  nifi_conf:
  nifi_database_repository:
  nifi_flowfile_repository:
  nifi_content_repository:
  nifi_provenance_repository:
  nifi_state:
  nifi_logs:

networks:
  lepm_network:
    driver: bridge
