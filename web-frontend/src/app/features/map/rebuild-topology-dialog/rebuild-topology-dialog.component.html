<h2 mat-dialog-title>Пересборка топологии линии</h2>

<mat-dialog-content>
  <p>На линии уже есть созданные пролёты и участки. Как пересобрать топологию?</p>
  <div class="options">
    <button mat-stroked-button class="option-btn" (click)="onMode('full')">
      <mat-icon color="warn">delete_sweep</mat-icon>
      <span class="option-title">Пересобрать с нуля</span>
      <span class="option-desc">Существующие пролёты и участки будут удалены и заменены на новые по текущей последовательности опор.</span>
    </button>
    <button mat-stroked-button class="option-btn" (click)="onMode('preserve')">
      <mat-icon color="primary">add_circle_outline</mat-icon>
      <span class="option-title">Добавить недостающее</span>
      <span class="option-desc">Уже созданные пролёты сохраняются, добавляются только отсутствующие между соседними опорами.</span>
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Отмена</button>
</mat-dialog-actions>
