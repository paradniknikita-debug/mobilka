<div appResizableDialog>
<h2 mat-dialog-title>
  <mat-icon>map</mat-icon>
  Предпросмотр на карте
</h2>
<mat-dialog-content>
  <p class="hint" *ngIf="points.length === 0 && polylines.length === 0">
    В импортированных данных не найдена геометрия для предпросмотра.
  </p>
  <div id="cim-preview-map" class="preview-map" *ngIf="points.length > 0 || polylines.length > 0"></div>
  <p class="count" *ngIf="points.length > 0 || polylines.length > 0">
    Точек: {{ points.length }}, связей: {{ polylines.length }}
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Закрыть</button>
</mat-dialog-actions>
</div>
